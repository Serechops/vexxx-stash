query MarkerStrings($q: String, $sort: String) {
  markerStrings(q: $q, sort: $sort) {
    id
    count
    title
  }
}

query Stats {
  stats {
    scene_count
    scenes_size
    scenes_duration
    image_count
    images_size
    gallery_count
    performer_count
    studio_count
    group_count
    tag_count
    total_o_count
    total_play_duration
    total_play_count
    scenes_played
  }
}

query Logs {
  logs {
    ...LogEntryData
  }
}
query Version {
  version {
    version
    hash
    build_time
    repo
  }
}

query LatestVersion {
  latestversion {
    version
    shorthash
    release_date
    url
    repo
  }
}

query SystemStats {
  systemStats {
    memory
    goroutines
  }
}

query AnalyticsData {
  analyticsData {
    scenes_by_codec {
      label
      count
      size
    }
    scenes_by_resolution {
      label
      count
      size
    }
    scenes_by_studio {
      label
      count
      size
    }
    scenes_by_rating {
      label
      count
    }
    scenes_by_month {
      label
      count
    }
    top_studios_by_watch_time {
      label
      count
      size
    }
    top_performers_by_watch_time {
      label
      count
      size
    }
    monthly_watch_activity {
      label
      count
    }
  }
}
