type RecycleBinEntry {
  id: ID!
  entityType: String!
  entityId: ID!
  entityName: String!
  deletedAt: Time!
  groupId: String
  """Full JSON snapshot of the entity at the time of deletion."""
  deletedData: Map!
}

type RecycleBinHistoryEntry {
  id: ID!
  entityType: String!
  entityId: ID!
  entityName: String!
  """Action taken: 'deleted', 'restored', or 'purged'."""
  action: String!
  actionedAt: Time!
  groupId: String
  """Human-readable summary of affected associations (e.g. '3 scenes · 2 performers')."""
  notes: String!
}
