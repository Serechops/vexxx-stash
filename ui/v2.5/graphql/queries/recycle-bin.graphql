fragment RecycleBinEntryData on RecycleBinEntry {
  id
  entityType
  entityId
  entityName
  deletedAt
  groupId
}

fragment RecycleBinHistoryEntryData on RecycleBinHistoryEntry {
  id
  entityType
  entityId
  entityName
  action
  actionedAt
  groupId
  notes
}

query RecycleBin($limit: Int, $offset: Int) {
  recycleBin(limit: $limit, offset: $offset) {
    ...RecycleBinEntryData
  }
}

query RecycleBinCount {
  recycleBinCount
}

query RecycleBinHistory($limit: Int, $offset: Int) {
  recycleBinHistory(limit: $limit, offset: $offset) {
    ...RecycleBinHistoryEntryData
  }
}

query RecycleBinHistoryCount {
  recycleBinHistoryCount
}

