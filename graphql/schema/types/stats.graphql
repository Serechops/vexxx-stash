"""A single breakdown bucket for the analytics dashboard."""
type AnalyticsBreakdown {
  label: String!
  count: Int!
  """Total file size in bytes for this bucket. Zero for non-storage breakdowns."""
  size: Float!
}

"""Aggregated analytics data for the library dashboard."""
type AnalyticsData {
  scenes_by_codec: [AnalyticsBreakdown!]!
  scenes_by_resolution: [AnalyticsBreakdown!]!
  scenes_by_studio: [AnalyticsBreakdown!]!
  scenes_by_rating: [AnalyticsBreakdown!]!
  scenes_by_month: [AnalyticsBreakdown!]!
  """Top studios ranked by total accumulated watch time (size = seconds)."""
  top_studios_by_watch_time: [AnalyticsBreakdown!]!
  """Top performers ranked by total accumulated watch time (size = seconds)."""
  top_performers_by_watch_time: [AnalyticsBreakdown!]!
  """Play-event counts per calendar month (YYYY-MM)."""
  monthly_watch_activity: [AnalyticsBreakdown!]!
}

type StatsResultType {
  scene_count: Int!
  scenes_size: Float!
  scenes_duration: Float!
  image_count: Int!
  images_size: Float!
  gallery_count: Int!
  performer_count: Int!
  studio_count: Int!
  group_count: Int!
  movie_count: Int! @deprecated(reason: "use group_count instead")
  tag_count: Int!
  total_o_count: Int!
  total_play_duration: Float!
  total_play_count: Int!
  scenes_played: Int!
}

type SystemStats {
  memory: Float! # Megabytes
  goroutines: Int!
}
