query Configuration {
  configuration {
    ...ConfigData
  }
}

query Directory($path: String, $fileExtensions: [String!]) {
  directory(path: $path, fileExtensions: $fileExtensions) {
    path
    parent
    directories
    files
  }
}

query SystemRoots {
  systemRoots
}

query ValidateStashBox($input: StashBoxInput!) {
  validateStashBoxCredentials(input: $input) {
    valid
    status
  }
}

query ValidateLibraryPath($path: String!) {
  validateLibraryPath(path: $path) {
    valid
    message
    isHostPath
    dockerMountCommand
    suggestedContainerPath
    availableContainerPaths
  }
}

query DockerMountedVolumes {
  dockerMountedVolumes {
    containerPath
    hostPath
    fsType
    isMediaMount
  }
}
