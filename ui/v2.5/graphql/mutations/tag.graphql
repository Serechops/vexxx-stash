mutation TagCreate($input: TagCreateInput!) {
  tagCreate(input: $input) {
    ...TagData
  }
}

mutation TagDestroy($id: ID!, $reassignPrimaryTagId: ID) {
  tagDestroy(input: { id: $id, reassign_primary_tag_id: $reassignPrimaryTagId })
}

mutation TagsDestroy($ids: [ID!]!, $reassignPrimaryTagId: ID) {
  tagsDestroy(ids: $ids, reassign_primary_tag_id: $reassignPrimaryTagId)
}

mutation TagUpdate($input: TagUpdateInput!) {
  tagUpdate(input: $input) {
    ...TagData
  }
}

mutation BulkTagUpdate($input: BulkTagUpdateInput!) {
  bulkTagUpdate(input: $input) {
    ...TagData
  }
}

mutation TagsMerge($source: [ID!]!, $destination: ID!) {
  tagsMerge(input: { source: $source, destination: $destination }) {
    ...TagData
  }
}
