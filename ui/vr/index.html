<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- VR/AR meta tags -->
  <meta name="vr" content="true">
  <meta name="webxr" content="true">
  <meta name="handy-vr-theater" content="immersive">

  <title>Vexxx VR Theater</title>

  <!-- Google TV fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    rel="stylesheet">

  <style>
    /* ─── Google TV Design Tokens (mirrored from main app) ─── */
    :root {
      --bg-primary: #121212;
      --bg-secondary: #1e1e1e;
      --bg-tertiary: #2a2a2a;
      --bg-card: #1e1e1e;
      --bg-surface: rgba(255, 255, 255, 0.04);
      --bg-surface-hover: rgba(255, 255, 255, 0.08);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-light: rgba(255, 255, 255, 0.12);
      --border-active: rgba(138, 180, 248, 0.35);
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #5f6368;
      --accent-blue: #8ab4f8;
      --accent-green: #81c995;
      --accent-red: #f28b82;
      --accent-amber: #fdd663;
      --accent-purple: #d7aefb;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --shadow-md: 0 4px 16px rgba(0, 0, 0, .4);
      --shadow-lg: 0 8px 30px rgba(0, 0, 0, .5);
      --transition-fast: 150ms cubic-bezier(.4, 0, .2, 1);
      --transition-normal: 250ms cubic-bezier(.4, 0, .2, 1);
    }

    /* ─── Material Symbols shorthand ─── */
    .mi {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 20px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: 'liga';
      vertical-align: middle;
    }

    /* ─── Reset & base ─── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Canvas ─── */
    #renderCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      outline: none;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* ─── Loading overlay (Google TV style) ─── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      transition: opacity 0.6s ease;
      pointer-events: all;
      will-change: opacity;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-content {
      text-align: center;
      animation: float 3s ease-in-out infinite;
    }

    .loading-title {
      font-size: clamp(1.8rem, 8vw, 3rem);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .loading-title .accent {
      color: var(--accent-blue);
    }

    .loading-sub {
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      margin-bottom: 28px;
      font-weight: 400;
    }

    /* Circular spinner */
    .loading-spinner {
      width: 48px;
      height: 48px;
      margin: 16px auto;
      position: relative;
    }

    .spinner-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent-blue);
      animation: spin 1.2s linear infinite;
    }

    .spinner-ring:nth-child(2) {
      width: 70%;
      height: 70%;
      top: 15%;
      left: 15%;
      border-top-color: var(--accent-purple);
      animation-duration: 0.9s;
      animation-direction: reverse;
    }

    /* Progress bar */
    .loading-progress {
      width: 200px;
      height: 3px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin: 16px auto 0;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-blue);
      border-radius: var(--radius-full);
      transition: width 0.3s ease;
    }

    .loading-messages {
      margin-top: 16px;
      font-size: 0.82rem;
      color: var(--text-muted);
      min-height: 22px;
      transition: opacity var(--transition-fast);
    }

    .message-fade {
      animation: messageFade 2s ease-in-out;
    }

    /* ─── Error overlay ─── */
    #error-overlay {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(18, 18, 18, 0.96);
      backdrop-filter: blur(16px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }

    #error-overlay.visible {
      display: flex;
    }

    .error-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(242, 139, 130, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-red);
      margin-bottom: 8px;
    }

    .error-icon .mi {
      font-size: 28px;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent-red);
    }

    .error-message {
      font-size: 0.9rem;
      color: var(--text-secondary);
      text-align: center;
      max-width: 380px;
      line-height: 1.6;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .error-button {
      padding: 10px 22px;
      border: none;
      border-radius: var(--radius-full);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .error-button.primary {
      background: var(--accent-blue);
      color: var(--bg-primary);
    }

    .error-button.primary:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    .error-button.secondary {
      background: var(--bg-surface-hover);
      color: var(--text-primary);
      border: 1px solid var(--border-light);
    }

    .error-button.secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    /* ─── Stats overlay (debug) ─── */
    #stats-overlay {
      position: fixed;
      bottom: 10px;
      left: 10px;
      z-index: 500;
      background: rgba(4, 4, 11, 0.95);
      color: var(--accent-green);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      pointer-events: none;
      backdrop-filter: blur(8px);
      display: none;
      border: 1px solid rgba(79, 142, 255, 0.18);
    }

    #stats-overlay.visible {
      display: block;
    }

    /* ─── VR indicator pill ─── */
    #vr-indicator {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 400;
      background: rgba(4, 4, 11, 0.95);
      backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-blue);
      border: 1px solid rgba(79, 142, 255, 0.35);
      display: none;
      align-items: center;
      gap: 8px;
    }

    #vr-indicator.visible {
      display: flex;
    }

    .vr-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent-blue);
      animation: pulse 2s infinite;
    }

    /* ─── Animations ─── */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    @keyframes messageFade {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }

      20% {
        opacity: 1;
        transform: translateY(0);
      }

      80% {
        opacity: 1;
        transform: translateY(0);
      }

      100% {
        opacity: 0;
        transform: translateY(-8px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

  <!-- Babylon.js core + GUI + Loaders + Addons (local bundles from npm) -->
  <script src="lib/babylon.js"></script>
  <script src="lib/babylon.gui.min.js"></script>
  <script src="lib/babylonjs.loaders.min.js"></script>
  <script src="lib/babylonjs.addons.min.js"></script>

  <!-- WebXR Polyfill (local bundle from npm) -->
  <script src="lib/webxr-polyfill.js"></script>
</head>

<body>
  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loading-content">
      <div class="loading-title">VEXXX <span class="accent">THEATER</span></div>

      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>

      <div class="loading-progress">
        <div id="loading-progress-fill" class="progress-fill"></div>
      </div>

      <div id="loading-messages" class="loading-messages">
        Initializing VR Theater…
      </div>
    </div>
  </div>

  <!-- Error overlay -->
  <div id="error-overlay">
    <div class="error-icon"><span class="mi">warning</span></div>
    <div class="error-title">Something went wrong</div>
    <div id="error-message" class="error-message"></div>
    <div class="error-actions">
      <button class="error-button primary" onclick="location.reload()">Reload</button>
      <button class="error-button secondary" onclick="hideError()">Dismiss</button>
    </div>
  </div>

  <!-- VR mode indicator -->
  <div id="vr-indicator">
    <span class="vr-dot"></span>
    <span>VR MODE</span>
  </div>

  <!-- Debug stats -->
  <div id="stats-overlay">
    <div>FPS: <span id="stats-fps">60</span></div>
    <div>Latency: <span id="stats-latency">0</span>ms</div>
    <div>Quality: <span id="stats-quality">High</span></div>
  </div>

  <!-- Hidden video element -->
  <video id="vr-vid" crossorigin="anonymous" preload="metadata" playsinline webkit-playsinline x5-playsinline muted
    style="display:none"></video>

  <!-- Babylon.js render canvas -->
  <canvas id="renderCanvas" touch-action="none"></canvas>

  <!-- App entry point -->
  <script type="module" src="./js/app.js"></script>

  <!-- Utilities (non-module) -->
  <script>
    /* Debug logger */
    function vrDbg(msg, level = 'info') {
      try {
        fetch('/vr/debug', {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: `[${level.toUpperCase()}] ${msg}`
        });
      } catch (_) { }
      if (level === 'error') console.error('[VR]', msg);
      else if (level === 'warn') console.warn('[VR]', msg);
      else console.log('[VR]', msg);
    }

    /* Global error handlers */
    window.onerror = function (msg, src, line, col, err) {
      const stack = err?.stack ? '\n' + err.stack : '';
      vrDbg(`${msg} @ ${src}:${line}:${col}${stack}`, 'error');
      showError(`Failed to load: ${msg}`);
      return false;
    };
    window.addEventListener('unhandledrejection', function (e) {
      const reason = e.reason?.stack || e.reason?.message || String(e.reason);
      vrDbg(`Unhandled Rejection: ${reason}`, 'error');
      showError('An unexpected error occurred');
    });

    /* WebXR detection */
    function checkWebXRSupport() {
      if ('xr' in navigator) {
        navigator.xr.isSessionSupported('immersive-vr').then(ok => {
          vrDbg(`WebXR immersive-vr ${ok ? 'supported' : 'not supported'}`);
          if (!ok) showWarning('VR mode may not be available on this device');
        });
      } else {
        vrDbg('WebXR not detected', 'warn');
      }
    }

    /* Loading progress */
    function updateLoadingProgress(progress, message) {
      const fill = document.getElementById('loading-progress-fill');
      const msgEl = document.getElementById('loading-messages');
      if (fill) fill.style.width = Math.min(100, Math.max(0, progress)) + '%';
      if (msgEl && message) {
        msgEl.textContent = message;
        msgEl.classList.add('message-fade');
        setTimeout(() => msgEl.classList.remove('message-fade'), 2000);
      }
    }

    /* Error/warning display */
    function showError(message) {
      const overlay = document.getElementById('error-overlay');
      const msgEl = document.getElementById('error-message');
      if (overlay && msgEl) {
        msgEl.textContent = message || 'Unable to initialize VR Theater';
        overlay.classList.add('visible');
        document.getElementById('loading-overlay')?.classList.add('hidden');
      }
    }
    function hideError() {
      document.getElementById('error-overlay')?.classList.remove('visible');
    }
    function showWarning(message) { vrDbg(message, 'warn'); }

    /* VR indicator */
    function setVRMode(enabled) {
      const el = document.getElementById('vr-indicator');
      if (el) el.classList.toggle('visible', enabled);
    }

    /* Stats display */
    function updateStats(fps, latency, quality) {
      const f = document.getElementById('stats-fps');
      const l = document.getElementById('stats-latency');
      const q = document.getElementById('stats-quality');
      if (f) f.textContent = Math.round(fps);
      if (l) l.textContent = Math.round(latency);
      if (q) q.textContent = quality;
    }
    function toggleStats() {
      document.getElementById('stats-overlay')?.classList.toggle('visible');
    }

    /* Keyboard shortcuts */
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'D') { e.preventDefault(); toggleStats(); }
      if (e.ctrlKey && e.shiftKey && e.key === 'R') { e.preventDefault(); location.reload(); }
    });

    /* Init checks */
    checkWebXRSupport();

    /* Expose globals for app.js */
    window.vrDbg = vrDbg;
    window.updateLoadingProgress = updateLoadingProgress;
    window.setVRMode = setVRMode;
    window.updateStats = updateStats;
    window.showError = showError;

    /* Lifecycle */
    document.addEventListener('visibilitychange', () => {
      vrDbg(document.hidden ? 'App hidden' : 'App visible');
    });
    window.addEventListener('load', () => {
      vrDbg('Page loaded');
      updateLoadingProgress(10, 'Loading complete, starting VR…');
    });
    window.addEventListener('orientationchange', () => {
      vrDbg(`Orientation changed to ${window.orientation}°`);
    });

    /* Memory pressure */
    if ('memory' in performance) {
      setInterval(() => {
        const m = performance.memory;
        if (m && m.usedJSHeapSize > m.jsHeapSizeLimit * 0.9) {
          vrDbg('High memory usage detected', 'warn');
        }
      }, 10000);
    }
  </script>
</body>

</html>
