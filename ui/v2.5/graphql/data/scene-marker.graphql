fragment SceneMarkerData on SceneMarker {
  id
  title
  seconds
  end_seconds
  stream
  preview
  screenshot

  scene {
    ...SceneMarkerSceneData
  }

  primary_tag {
    id
    name
  }

  tags {
    id
    name
  }
}

fragment SceneMarkerSceneData on Scene {
  id
  title
  vr_mode
  files {
    width
    height
    path
  }
  performers {
    id
    name
    image_path
  }
}
